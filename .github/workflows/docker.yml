name: Docker Build & Deploy

on:
  workflow_run:
    workflows: ["CI Maven"]
    types:
      - completed

jobs:
  docker:
    # ⚠️ Solo ejecutar si CI ha ido bien
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout del repo
      - name: Checkout del código
        uses: actions/checkout@v4

      # 📦 Descargar artefacto del workflow CI
      - name: Descargar JAR desde CI
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: "CI Maven"   # nombre EXACTO del workflow CI
          run_id: ${{ github.event.workflow_run.id }}
          name: store-app-jar
          path: artifact/

      # 🐳 Construir imagen Docker
      - name: Build Docker image
        run: docker build -t store-app .

      # 🧹 Limpiar entorno previo
      - name: Parar entorno previo
        run: docker compose down -v || true

      # 🚀 Levantar app + PostgreSQL
      - name: Levantar entorno
        run: docker compose up -d

      # ⏳ Esperar a que la app responda
      - name: Esperar a la aplicación
        run: |
          for i in {1..24}; do
            if curl -fsS http://localhost:8888/actuator/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done

          echo "La aplicación no respondió"
          exit 1

      # 📄 Recoger logs si falla
      - name: Recoger logs
        if: failure()
        run: |
          mkdir -p logs
          docker compose logs > logs/docker-compose.log
          docker compose logs app > logs/app.log || true
          docker compose logs db > logs/db.log || true

      # 📦 Subir logs como artefacto
      - name: Subir logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: logs/

      # 🧹 Limpieza final
      - name: Limpiar entorno
        if: always()
        run: docker compose down -v
