name: Docker Build & Deploy

on:
  workflow_run:
    workflows: ["CI Maven"]
    types:
      - completed

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout del repo
      - name: Checkout del código
        uses: actions/checkout@v4

      # 📦 Descargar artefacto JAR del workflow CI
      - name: Descargar JAR desde CI
        uses: actions/download-artifact@v4
        with:
          name: store-app-jar
          path: artifact/

      # 🐳 Build imagen Docker
      - name: Build Docker image
        run: docker build -t store-app .

      # 🧹 Parar entorno previo
      - name: Parar entorno previo
        run: docker compose down -v || true

      # 🚀 Levantar entorno (app + PostgreSQL)
      - name: Levantar entorno
        run: docker compose up -d

      # ⏳ Esperar a que la app esté lista
      - name: Esperar a la aplicación
        run: |
          for i in {1..24}; do
            if curl -fsS http://localhost:8888/actuator/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 5
          done

          echo "La aplicación no respondió"
          exit 1

      # 📄 Recoger logs SI FALLA
      - name: Recoger logs de contenedores
        if: failure()
        run: |
          mkdir -p logs

          # Logs de todos los servicios
          docker compose logs > logs/docker-compose.log

          # Logs individuales (más claros para alumnos)
          docker compose logs app > logs/app.log || true
          docker compose logs db > logs/db.log || true

      # 📦 Subir logs como artefacto
      - name: Subir logs como artefacto
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: logs/

      # 🧹 Limpieza final
      - name: Limpiar entorno
        if: always()
        run: docker compose down -v
